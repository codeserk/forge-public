name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          cd typescript && npm ci

      - name: Build stats
        working-directory: typescript/packages/stats
        run: npm run build

      - name: Build stats-browser
        working-directory: typescript/packages/stats-browser
        run: npm run build

      - name: Copy CDN script to docs
        run: |
          mkdir -p typescript/apps/docs/public/cdn
          cp typescript/packages/stats-browser/dist/index.iife.js typescript/apps/docs/public/cdn/stats.js

      - name: Build docs
        working-directory: typescript/apps/docs
        run: npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: typescript/apps/docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
